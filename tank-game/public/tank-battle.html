<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>坦克大战</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap');

        :root {
            --cyan: #00ffff;
            --cyan-dim: #006666;
            --magenta: #ff00ff;
            --red: #ff3366;
            --green: #00ff88;
            --yellow: #ffff00;
            --dark-bg: #0a0a15;
            --panel-bg: rgba(5, 15, 30, 0.85);
            --glass-bg: rgba(10, 20, 40, 0.6);
            --glass-border: rgba(0, 255, 255, 0.15);
            --font-display: 'Orbitron', monospace;
            --font-ui: 'Rajdhani', 'Segoe UI', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a15 0%, #1a1a2e 50%, #0f0f1a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: var(--font-ui);
            overflow: hidden;
        }

        /* ===== Animated Background ===== */
        .bg-anim {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-anim .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            animation: orbFloat 12s ease-in-out infinite alternate;
        }

        .bg-anim .orb:nth-child(1) {
            width: 400px; height: 400px;
            background: rgba(0, 255, 255, 0.06);
            top: -10%; left: -5%;
            animation-duration: 14s;
        }

        .bg-anim .orb:nth-child(2) {
            width: 350px; height: 350px;
            background: rgba(255, 0, 255, 0.05);
            bottom: -10%; right: -5%;
            animation-duration: 18s;
            animation-delay: -4s;
        }

        .bg-anim .orb:nth-child(3) {
            width: 250px; height: 250px;
            background: rgba(0, 255, 136, 0.04);
            top: 50%; left: 60%;
            animation-duration: 16s;
            animation-delay: -8s;
        }

        @keyframes orbFloat {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(40px, -30px) scale(1.1); }
            100% { transform: translate(-20px, 20px) scale(0.95); }
        }

        /* ===== Scanline overlay ===== */
        .scanlines {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9999;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.03) 2px,
                rgba(0, 0, 0, 0.03) 4px
            );
        }

        /* ===== Game Container ===== */
        .game-container {
            position: relative;
            z-index: 1;
        }

        h1 {
            color: var(--cyan);
            text-shadow: 0 0 20px var(--cyan), 0 0 60px rgba(0, 255, 255, 0.4);
            margin-bottom: 20px;
            font-size: 2.5rem;
            letter-spacing: 12px;
            font-weight: 900;
            font-family: var(--font-display);
            position: relative;
            z-index: 1;
        }

        #gameCanvas {
            border: 2px solid rgba(0, 255, 255, 0.5);
            box-shadow:
                0 0 30px rgba(0, 255, 255, 0.2),
                0 0 60px rgba(0, 255, 255, 0.05),
                inset 0 0 80px rgba(0, 255, 255, 0.03);
            background: #0a0a12;
            border-radius: 6px;
        }

        /* ===== HUD Panel ===== */
        .ui-panel {
            position: absolute;
            top: 0; left: 0; right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: linear-gradient(180deg, rgba(0, 10, 20, 0.7) 0%, transparent 100%);
            border-radius: 6px 6px 0 0;
        }

        .ui-box {
            background: rgba(5, 15, 30, 0.75);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 255, 255, 0.2);
            padding: 6px 16px;
            border-radius: 6px;
            font-size: 15px;
            font-family: var(--font-ui);
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .ui-box:hover {
            border-color: rgba(0, 255, 255, 0.5);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.15);
        }

        .ui-box.level {
            color: var(--yellow);
            text-shadow: 0 0 8px rgba(255, 255, 0, 0.5);
            border-color: rgba(255, 255, 0, 0.2);
        }

        .ui-box.level:hover {
            border-color: rgba(255, 255, 0, 0.5);
            box-shadow: 0 0 15px rgba(255, 255, 0, 0.15);
        }

        .ui-box.score {
            color: var(--magenta);
            text-shadow: 0 0 8px rgba(255, 0, 255, 0.5);
            border-color: rgba(255, 0, 255, 0.2);
        }

        .ui-box.score:hover {
            border-color: rgba(255, 0, 255, 0.5);
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.15);
        }

        .ui-box.lives {
            color: var(--green);
            text-shadow: 0 0 8px rgba(0, 255, 136, 0.5);
            border-color: rgba(0, 255, 136, 0.2);
        }

        .ui-box.lives:hover {
            border-color: rgba(0, 255, 136, 0.5);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.15);
        }

        .ui-box.user-panel {
            color: var(--cyan);
            display: none;
        }

        /* ===== Level Selector Panel ===== */
        #levelSelector {
            position: fixed;
            left: 0;
            top: 0;
            width: 80px;
            height: 100%;
            background: linear-gradient(90deg, rgba(5, 15, 30, 0.95) 0%, rgba(5, 15, 30, 0.85) 70%, transparent 100%);
            padding: 80px 10px 20px 10px;
            display: none;
            flex-direction: column;
            align-items: center;
            z-index: 100;
            border-right: 1px solid rgba(0, 255, 255, 0.1);
        }

        #levelSelector.show {
            display: flex;
        }

        .level-title {
            color: var(--cyan);
            font-family: var(--font-display);
            font-size: 12px;
            letter-spacing: 2px;
            margin-bottom: 16px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
            writing-mode: vertical-rl;
        }

        .level-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
            max-height: calc(100% - 40px);
            padding-right: 4px;
        }

        .level-grid::-webkit-scrollbar {
            width: 3px;
        }

        .level-grid::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 255, 0.3);
            border-radius: 2px;
        }

        .level-btn {
            width: 52px;
            height: 36px;
            background: rgba(0, 20, 40, 0.6);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 6px;
            color: rgba(150, 170, 190, 0.6);
            font-family: var(--font-display);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .level-btn:hover {
            background: rgba(0, 40, 60, 0.7);
            border-color: rgba(0, 255, 255, 0.5);
            color: var(--cyan);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .level-btn.current {
            background: rgba(0, 255, 255, 0.15);
            border-color: var(--cyan);
            color: var(--cyan);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }

        .level-btn.locked {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .level-btn.locked:hover {
            background: rgba(0, 20, 40, 0.6);
            border-color: rgba(0, 255, 255, 0.2);
            color: rgba(150, 170, 190, 0.6);
            box-shadow: none;
            transform: none;
        }

        #logoutBtn {
            margin-left: 10px;
            background: linear-gradient(135deg, #ff3366, #cc1144);
            border: none;
            color: #fff;
            padding: 3px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: var(--font-ui);
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s ease;
        }

        #logoutBtn:hover {
            background: linear-gradient(135deg, #ff4477, #dd2255);
            box-shadow: 0 0 12px rgba(255, 51, 102, 0.4);
            transform: translateY(-1px);
        }

        /* ===== Controls Bar ===== */
        .controls {
            margin-top: 16px;
            color: rgba(150, 170, 190, 0.6);
            font-size: 13px;
            text-align: center;
            letter-spacing: 0.5px;
            font-family: var(--font-ui);
            font-weight: 600;
        }

        .controls span {
            color: rgba(0, 255, 255, 0.7);
            margin: 0 8px;
            padding: 4px 12px;
            border: 1px solid rgba(0, 255, 255, 0.15);
            border-radius: 4px;
            background: rgba(0, 255, 255, 0.03);
            font-size: 12px;
            transition: all 0.2s ease;
        }

        .controls span:hover {
            border-color: rgba(0, 255, 255, 0.4);
            background: rgba(0, 255, 255, 0.08);
            color: var(--cyan);
        }

        .heart {
            display: inline-block;
            color: #ff3366;
            text-shadow: 0 0 8px rgba(255, 51, 102, 0.6);
            margin-right: 2px;
        }

        /* ===== Auth Panel - Full Redesign ===== */
        #authPanel {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(ellipse at center, rgba(10, 15, 30, 0.97) 0%, rgba(5, 5, 12, 0.99) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .auth-card {
            width: 380px;
            padding: 40px 36px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.4),
                0 0 80px rgba(0, 255, 255, 0.03),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0; left: -50%;
            width: 200%; height: 1px;
            background: linear-gradient(90deg, transparent, var(--cyan), transparent);
            animation: scanLine 4s linear infinite;
        }

        @keyframes scanLine {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .auth-title {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 900;
            color: var(--cyan);
            text-shadow: 0 0 30px rgba(0, 255, 255, 0.5), 0 0 60px rgba(0, 255, 255, 0.2);
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: 8px;
        }

        .auth-subtitle {
            text-align: center;
            color: rgba(150, 170, 190, 0.5);
            font-size: 13px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 32px;
            font-family: var(--font-ui);
        }

        .auth-input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .auth-input-group input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            background: rgba(0, 20, 40, 0.5);
            border: 1px solid rgba(0, 255, 255, 0.12);
            color: #e0f0ff;
            font-size: 15px;
            font-family: var(--font-ui);
            font-weight: 600;
            border-radius: 8px;
            outline: none;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        .auth-input-group input::placeholder {
            color: rgba(100, 140, 170, 0.4);
            font-weight: 400;
        }

        .auth-input-group input:focus {
            border-color: rgba(0, 255, 255, 0.5);
            background: rgba(0, 25, 50, 0.6);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.08), inset 0 0 20px rgba(0, 255, 255, 0.02);
        }

        .auth-input-group .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(0, 255, 255, 0.3);
            font-size: 16px;
            transition: color 0.3s ease;
        }

        .auth-input-group input:focus + .input-icon,
        .auth-input-group input:focus ~ .input-icon {
            color: rgba(0, 255, 255, 0.6);
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            margin-top: 8px;
            background: linear-gradient(135deg, #00cccc, #00eeff);
            color: #001a1a;
            font-size: 16px;
            font-family: var(--font-ui);
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .auth-btn::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(
                45deg,
                transparent 40%,
                rgba(255, 255, 255, 0.1) 50%,
                transparent 60%
            );
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }

        .auth-btn:hover {
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3), 0 4px 15px rgba(0, 0, 0, 0.3);
            transform: translateY(-2px);
        }

        .auth-btn:hover::after {
            transform: translateX(100%);
        }

        .auth-btn:active {
            transform: translateY(0);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
        }

        .auth-switch {
            text-align: center;
            color: rgba(150, 170, 190, 0.5);
            margin-top: 20px;
            font-size: 14px;
            font-family: var(--font-ui);
        }

        .auth-switch a {
            color: var(--cyan);
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
            position: relative;
        }

        .auth-switch a::after {
            content: '';
            position: absolute;
            bottom: -2px; left: 0;
            width: 0; height: 1px;
            background: var(--cyan);
            transition: width 0.3s ease;
        }

        .auth-switch a:hover {
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .auth-switch a:hover::after {
            width: 100%;
        }

        .auth-msg {
            text-align: center;
            color: var(--red);
            margin-top: 12px;
            font-size: 13px;
            font-family: var(--font-ui);
            min-height: 20px;
            transition: all 0.3s ease;
        }

        .auth-success {
            color: var(--green) !important;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }

        /* Form transition */
        #loginForm, #registerForm {
            animation: fadeSlideIn 0.4s ease;
        }

        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Particle canvas for auth */
        #authParticles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 999;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="bg-anim">
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
    </div>
    <div class="scanlines"></div>

    <!-- 登录/注册界面 -->
    <canvas id="authParticles"></canvas>
    <div id="authPanel">
        <div class="auth-card">
            <div class="auth-title">TANK BATTLE</div>
            <div class="auth-subtitle">Armored Warfare</div>

            <div id="loginForm">
                <div class="auth-input-group">
                    <input type="text" id="loginUsername" placeholder="用户名">
                    <span class="input-icon">&#9678;</span>
                </div>
                <div class="auth-input-group">
                    <input type="password" id="loginPassword" placeholder="密码">
                    <span class="input-icon">&#9919;</span>
                </div>
                <button class="auth-btn" onclick="login()">登 录</button>
                <div class="auth-switch">
                    没有账号? <a href="#" onclick="showRegister()">立即注册</a>
                </div>
                <p id="loginMsg" class="auth-msg"></p>
            </div>

            <div id="registerForm" style="display:none;">
                <div class="auth-input-group">
                    <input type="text" id="regUsername" placeholder="用户名 (3-20字符)">
                    <span class="input-icon">&#9678;</span>
                </div>
                <div class="auth-input-group">
                    <input type="password" id="regPassword" placeholder="密码 (至少6位)">
                    <span class="input-icon">&#9919;</span>
                </div>
                <button class="auth-btn" onclick="register()">注 册</button>
                <div class="auth-switch">
                    已有账号? <a href="#" onclick="showLogin()">返回登录</a>
                </div>
                <p id="regMsg" class="auth-msg"></p>
            </div>
        </div>
    </div>

    <!-- 关卡选择面板 -->
    <div id="levelSelector">
        <div class="level-title">选择关卡</div>
        <div class="level-grid" id="levelGrid"></div>
    </div>

    <h1 style="display:none;">TANK BATTLE</h1>
    <div class="game-container">
        <canvas id="gameCanvas" width="900" height="650"></canvas>
        <div class="ui-panel">
            <div class="ui-box level">关卡 <span id="levelNum">1</span>/12</div>
            <div class="ui-box score">得分 <span id="scoreNum">0</span></div>
            <div class="ui-box lives">生命 <span id="livesNum">&#10084;&#10084;&#10084;</span></div>
            <div id="userPanel" class="ui-box user-panel">
                <span id="userName"></span>
                <button id="logoutBtn" onclick="logout()">登出</button>
            </div>
        </div>
    </div>
    <div class="controls">
        <span>W/&uarr; 前进</span>
        <span>S/&darr; 后退</span>
        <span>A/&larr; 左转</span>
        <span>D/&rarr; 右转</span>
        <span>空格 射击</span>
    </div>

    <script>
        // ===== Auth Particle Background =====
        (function() {
            const pc = document.getElementById('authParticles');
            const pctx = pc.getContext('2d');
            let authParticles = [];
            const maxP = 60;

            function resizeAuthCanvas() {
                pc.width = window.innerWidth;
                pc.height = window.innerHeight;
            }
            resizeAuthCanvas();
            window.addEventListener('resize', resizeAuthCanvas);

            class AuthParticle {
                constructor() { this.reset(); }
                reset() {
                    this.x = Math.random() * pc.width;
                    this.y = Math.random() * pc.height;
                    this.size = Math.random() * 2 + 0.5;
                    this.speedX = (Math.random() - 0.5) * 0.5;
                    this.speedY = (Math.random() - 0.5) * 0.5;
                    this.alpha = Math.random() * 0.4 + 0.1;
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    if (this.x < 0 || this.x > pc.width || this.y < 0 || this.y > pc.height) this.reset();
                }
                draw() {
                    pctx.beginPath();
                    pctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    pctx.fillStyle = `rgba(0, 255, 255, ${this.alpha})`;
                    pctx.fill();
                }
            }

            for (let i = 0; i < maxP; i++) authParticles.push(new AuthParticle());

            function drawAuthParticles() {
                if (document.getElementById('authPanel').style.display === 'none') return;
                pctx.clearRect(0, 0, pc.width, pc.height);

                // Draw connections
                for (let i = 0; i < authParticles.length; i++) {
                    for (let j = i + 1; j < authParticles.length; j++) {
                        const dx = authParticles[i].x - authParticles[j].x;
                        const dy = authParticles[i].y - authParticles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 120) {
                            pctx.beginPath();
                            pctx.moveTo(authParticles[i].x, authParticles[i].y);
                            pctx.lineTo(authParticles[j].x, authParticles[j].y);
                            pctx.strokeStyle = `rgba(0, 255, 255, ${0.08 * (1 - dist / 120)})`;
                            pctx.lineWidth = 0.5;
                            pctx.stroke();
                        }
                    }
                }

                authParticles.forEach(p => { p.update(); p.draw(); });
                requestAnimationFrame(drawAuthParticles);
            }
            drawAuthParticles();
        })();

        // 用户相关
        let currentUser = null;

        // 显示登录表单
        function showLogin() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginMsg').textContent = '';
            document.getElementById('loginMsg').classList.remove('auth-success');
        }

        // 显示注册表单
        function showRegister() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('registerForm').style.animation = 'none';
            document.getElementById('registerForm').offsetHeight; // trigger reflow
            document.getElementById('registerForm').style.animation = '';
            document.getElementById('regMsg').textContent = '';
            document.getElementById('regMsg').classList.remove('auth-success');
        }

        // 注册
        async function register() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;

            const response = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const result = await response.json();

            if (result.success) {
                const msg = document.getElementById('regMsg');
                msg.classList.add('auth-success');
                msg.textContent = '注册成功，请登录';
                setTimeout(showLogin, 1500);
            } else {
                document.getElementById('regMsg').textContent = result.message;
            }
        }

        // 登录
        async function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const result = await response.json();

            if (result.success) {
                currentUser = result.user;
                document.getElementById('authPanel').style.display = 'none';
                // 显示用户名
                document.getElementById('userPanel').style.display = 'block';
                document.getElementById('userName').textContent = currentUser.username;
                // 显示关卡选择面板
                document.getElementById('levelSelector').classList.add('show');
                // 初始化游戏（从保存的关卡开始）
                initGameWithLevel(currentUser.currentLevel);
                // 渲染关卡选择器
                renderLevelSelector();
            } else {
                document.getElementById('loginMsg').textContent = result.message;
            }
        }

        // 登出 - 刷新页面回到登录界面

            if (confirm('确定要登出吗？')) {
                currentUser = null;
                location.reload();
            }
        }

        // 渲染关卡选择面板
        function renderLevelSelector() {
            const levelGrid = document.getElementById('levelGrid');
            levelGrid.innerHTML = '';

            const maxLevel = currentUser.maxLevel || 1;
            const currentLevel = gameState.level;

            for (let i = 1; i <= 12; i++) {
                const btn = document.createElement('button');
                btn.className = 'level-btn';
                btn.textContent = i;

                // 未解锁的关卡
                if (i > maxLevel) {
                    btn.classList.add('locked');
                    btn.title = '未解锁';
                } else {
                    // 当前关卡
                    if (i === currentLevel) {
                        btn.classList.add('current');
                    }
                    btn.onclick = () => selectLevel(i);
                }

                levelGrid.appendChild(btn);
            }
        }

        // 选择关卡
        function selectLevel(level) {
            if (!currentUser || level > (currentUser.maxLevel || 1)) return;

            gameState.level = level;
            gameState.score = 0;
            gameState.isPlaying = true;
            gameState.isGameOver = false;
            gameState.isVictory = false;

            // 重建围墙
            walls = [];
            const mapType = levels[level - 1].map;
            for (let w of wallLayouts[mapType]) {
                walls.push(new Wall(w.x, w.y, w.w, w.h, w.hp));
            }

            initLevel(level);
            updateUI();
            renderLevelSelector();
        }

            if (!currentUser || !currentUser.id) return;

            const response = await fetch('/api/progress', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: currentUser.id, level, score })
            });
            const result = await response.json();

                // 更新本地用户数据
                currentUser.currentLevel = level;
                if (level > currentUser.maxLevel) {
                    currentUser.maxLevel = level;
                }
                // 更新关卡选择面板
                if (document.getElementById('levelSelector').classList.contains('show')) {
                    renderLevelSelector();
                }
            }
        }
