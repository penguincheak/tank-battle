        // 坦克类
        class Tank {
            constructor(x, y, color, isPlayer = false) {
                this.x = x;
                this.y = y;
                this.width = 36;
                this.height = 36;
                this.color = color;
                this.color2 = isPlayer ? '#00ffff' : '#ff3366';
                this.speed = isPlayer ? 1.5 : 0.5;
                this.angle = isPlayer ? 0 : Math.random() * Math.PI * 2;
                this.isPlayer = isPlayer;
                this.cooldown = 0;
                this.health = isPlayer ? 3 : 3;
                this.maxHealth = isPlayer ? 3 : 3;
                this.bobOffset = 0;
                this.stuckTimer = 0;  // 卡住计时器
                this.lastAngle = this.angle;  // 上次朝向
                this.moveDistance = 0;  // 连续移动距离
                this.invincibleTimer = 0;  // 无敌时间
            }

            draw() {
                ctx.save();

                // 无敌闪烁效果（玩家）
                if (this.isPlayer && this.invincibleTimer > 0) {
                    if (Math.floor(this.invincibleTimer / 5) % 2 === 0) {
                        ctx.globalAlpha = 0.4;
                    }
                }

                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                const bob = Math.sin(this.bobOffset) * 0.8;
                const W = this.width;
                const H = this.height;
                const p = this.isPlayer;
                const c1 = p ? '#00cccc' : '#cc3333';
                const c2 = p ? '#006666' : '#661111';
                const c3 = p ? '#003333' : '#330808';
                const glow = p ? '#00ffff' : '#ff3366';
                const glowR = p ? [0,255,255] : [255,51,102];

                // Engine glow under tank
                ctx.shadowColor = glow;
                ctx.shadowBlur = 25;
                ctx.fillStyle = `rgba(${glowR[0]},${glowR[1]},${glowR[2]},0.08)`;
                ctx.beginPath();
                ctx.ellipse(0, 4 + bob, W * 0.6, H * 0.5, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                // === LEFT TRACK ===
                const tw = 9, tOff = W/2 + 2;
                const tTop = -H/2 + 1 + bob, tH = H - 2;
                // Outer track body
                const ltGrad = ctx.createLinearGradient(-tOff - tw, 0, -tOff + 2, 0);
                ltGrad.addColorStop(0, '#111');
                ltGrad.addColorStop(0.3, '#2a2a2a');
                ltGrad.addColorStop(0.7, '#222');
                ltGrad.addColorStop(1, '#181818');
                ctx.fillStyle = ltGrad;
                ctx.beginPath();
                ctx.roundRect(-tOff - tw + 1, tTop, tw, tH, 2);
                ctx.fill();
                // Track tread pattern
                ctx.strokeStyle = '#3a3a3a';
                ctx.lineWidth = 1;
                for (let i = 0; i < tH; i += 5) {
                    const yo = (i + this.bobOffset * 3) % tH;
                    ctx.beginPath();
                    ctx.moveTo(-tOff - tw + 2, tTop + yo);
                    ctx.lineTo(-tOff - 1, tTop + yo);
                    ctx.stroke();
                }
                // Track edge highlight
                ctx.strokeStyle = `rgba(${glowR[0]},${glowR[1]},${glowR[2]},0.15)`;
                ctx.lineWidth = 1;
                ctx.strokeRect(-tOff - tw + 1.5, tTop + 0.5, tw - 1, tH - 1);
                // Track wheel dots
                ctx.fillStyle = '#444';
                for (let i = 0; i < 3; i++) {
                    ctx.beginPath();
                    ctx.arc(-tOff - tw/2 + 0.5, tTop + tH * (0.2 + i * 0.3), 3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#555';
                    ctx.lineWidth = 0.5;
                    ctx.stroke();
                }

                // === RIGHT TRACK ===
                const rtGrad = ctx.createLinearGradient(tOff - 2, 0, tOff + tw, 0);
                rtGrad.addColorStop(0, '#181818');
                rtGrad.addColorStop(0.3, '#222');
                rtGrad.addColorStop(0.7, '#2a2a2a');
                rtGrad.addColorStop(1, '#111');
                ctx.fillStyle = rtGrad;
                ctx.beginPath();
                ctx.roundRect(tOff - 1, tTop, tw, tH, 2);
                ctx.fill();
                ctx.strokeStyle = '#3a3a3a';
                ctx.lineWidth = 1;
                for (let i = 0; i < tH; i += 5) {
                    const yo = (i + this.bobOffset * 3) % tH;
                    ctx.beginPath();
                    ctx.moveTo(tOff + 1, tTop + yo);
                    ctx.lineTo(tOff + tw - 1, tTop + yo);
                    ctx.stroke();
                }
                ctx.strokeStyle = `rgba(${glowR[0]},${glowR[1]},${glowR[2]},0.15)`;
                ctx.lineWidth = 1;
                ctx.strokeRect(tOff - 0.5, tTop + 0.5, tw - 1, tH - 1);
                ctx.fillStyle = '#444';
                for (let i = 0; i < 3; i++) {
                    ctx.beginPath();
                    ctx.arc(tOff + tw/2 - 0.5, tTop + tH * (0.2 + i * 0.3), 3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#555';
                    ctx.lineWidth = 0.5;
                    ctx.stroke();
                }

                // === HULL (main body) ===
                const hOff = W/2 - 4, hTop = -H/2 + 2 + bob, hW = W - 8, hH = H - 4;
                const bodyGrad = ctx.createLinearGradient(0, hTop, 0, hTop + hH);
                bodyGrad.addColorStop(0, c1);
                bodyGrad.addColorStop(0.4, p ? '#007777' : '#882222');
                bodyGrad.addColorStop(1, c2);
                ctx.fillStyle = bodyGrad;
                ctx.beginPath();
                ctx.roundRect(-hOff, hTop, hW, hH, 3);
                ctx.fill();

                // Hull armor panel bevels
                ctx.strokeStyle = `rgba(${glowR[0]},${glowR[1]},${glowR[2]},0.2)`;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.roundRect(-hOff + 3, hTop + 3, hW - 6, hH - 6, 2);
                ctx.stroke();

                // Hull front chevron
                ctx.strokeStyle = `rgba(${glowR[0]},${glowR[1]},${glowR[2]},0.35)`;
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(-6, hTop + 4);
                ctx.lineTo(0, hTop + 1);
                ctx.lineTo(6, hTop + 4);
                ctx.stroke();

                // Hull rear grille
                ctx.strokeStyle = 'rgba(0,0,0,0.4)';
                ctx.lineWidth = 1;
                for (let i = 0; i < 4; i++) {
                    ctx.beginPath();
                    ctx.moveTo(-8, hTop + hH - 6 - i * 3);
                    ctx.lineTo(8, hTop + hH - 6 - i * 3);
                    ctx.stroke();
                }

                // Side armor rivets
                ctx.fillStyle = `rgba(${glowR[0]},${glowR[1]},${glowR[2]},0.25)`;
                for (let i = 0; i < 3; i++) {
                    ctx.beginPath();
                    ctx.arc(-hOff + 5, hTop + 6 + i * (hH - 12) / 2, 1.5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(hOff - 5, hTop + 6 + i * (hH - 12) / 2, 1.5, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Exhaust pipes at rear
                ctx.fillStyle = '#222';
                ctx.beginPath();
                ctx.roundRect(-9, hTop + hH, 4, 5, 1);
                ctx.fill();
                ctx.beginPath();
                ctx.roundRect(5, hTop + hH, 4, 5, 1);
                ctx.fill();
                // Exhaust glow
                if (p || Math.random() > 0.5) {
                    ctx.fillStyle = `rgba(${glowR[0]},${glowR[1]},${glowR[2]},0.15)`;
                    ctx.beginPath();
                    ctx.arc(-7, hTop + hH + 5, 3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(7, hTop + hH + 5, 3, 0, Math.PI * 2);
                    ctx.fill();
                }

                // === TURRET ===
                // Turret base shadow
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.ellipse(0, 2 + bob, 13, 10, 0, 0, Math.PI * 2);
                ctx.fill();

                // Turret body
                const tGrad = ctx.createRadialGradient(-2, -2 + bob, 0, 0, 0 + bob, 12);
                tGrad.addColorStop(0, p ? '#00bbbb' : '#bb3333');
                tGrad.addColorStop(0.6, p ? '#008888' : '#882222');
                tGrad.addColorStop(1, c2);
                ctx.fillStyle = tGrad;
                ctx.beginPath();
                ctx.arc(0, bob, 11, 0, Math.PI * 2);
                ctx.fill();

                // Turret ring
                ctx.strokeStyle = `rgba(${glowR[0]},${glowR[1]},${glowR[2]},0.3)`;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(0, bob, 11, 0, Math.PI * 2);
                ctx.stroke();

                // Turret hatch
                ctx.fillStyle = p ? '#005555' : '#551111';
                ctx.beginPath();
                ctx.ellipse(-3, -3 + bob, 4, 3, -0.3, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = `rgba(${glowR[0]},${glowR[1]},${glowR[2]},0.2)`;
                ctx.lineWidth = 0.5;
                ctx.stroke();

                // Vision slot
                ctx.fillStyle = `rgba(${glowR[0]},${glowR[1]},${glowR[2]},0.5)`;
                ctx.fillRect(-2, -8 + bob, 4, 2);

                // === BARREL ===
                const bLen = 28;
                const bW = 5;
                const bY = -H/2 - 4 + bob;
                // Barrel shadow
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fillRect(-bW/2 - 1, bY, bW + 2, bLen);
                // Barrel body with bevel
                const barGrad = ctx.createLinearGradient(-bW/2, 0, bW/2, 0);
                barGrad.addColorStop(0, '#333');
                barGrad.addColorStop(0.3, '#555');
                barGrad.addColorStop(0.5, '#666');
                barGrad.addColorStop(0.7, '#555');
                barGrad.addColorStop(1, '#333');
                ctx.fillStyle = barGrad;
                ctx.fillRect(-bW/2, bY, bW, bLen);
                // Barrel thermal sleeve rings
                ctx.strokeStyle = '#444';
                ctx.lineWidth = 2;
                for (let i = 0; i < 3; i++) {
                    ctx.beginPath();
                    ctx.moveTo(-bW/2 - 0.5, bY + 4 + i * 8);
                    ctx.lineTo(bW/2 + 0.5, bY + 4 + i * 8);
                    ctx.stroke();
                }
                // Barrel highlight line
                ctx.strokeStyle = 'rgba(255,255,255,0.12)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(-bW/2 + 1.5, bY + 2);
                ctx.lineTo(-bW/2 + 1.5, bY + bLen - 2);
                ctx.stroke();

                // Muzzle brake
                const mY = bY - 3;
                ctx.fillStyle = '#2a2a2a';
                ctx.beginPath();
                ctx.roundRect(-4, mY, 8, 6, 1);
                ctx.fill();
                // Muzzle bore
                ctx.fillStyle = '#111';
                ctx.beginPath();
                ctx.arc(0, mY - 1, 2.5, 0, Math.PI * 2);
                ctx.fill();
                // Muzzle glow
                ctx.shadowColor = glow;
                ctx.shadowBlur = 8;
                ctx.fillStyle = `rgba(${glowR[0]},${glowR[1]},${glowR[2]},0.6)`;
                ctx.beginPath();
                ctx.arc(0, mY - 1, 1.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                // === ANTENNA ===
                ctx.strokeStyle = `rgba(${glowR[0]},${glowR[1]},${glowR[2]},0.4)`;
                ctx.lineWidth = 0.7;
                ctx.beginPath();
                ctx.moveTo(8, -6 + bob);
                ctx.lineTo(12, -20 + bob);
                ctx.stroke();
                // Antenna tip
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(12, -20 + bob, 1.2, 0, Math.PI * 2);
                ctx.fill();

                // === OVERALL GLOW ===
                ctx.shadowColor = glow;
                ctx.shadowBlur = 12;
                ctx.strokeStyle = `rgba(${glowR[0]},${glowR[1]},${glowR[2]},0.15)`;
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.roundRect(-hOff - 1, hTop - 1, hW + 2, hH + 2, 4);
                ctx.stroke();
                ctx.shadowBlur = 0;

                // === HEALTH BAR ===
                if (this.health < this.maxHealth) {
                    const hpRatio = this.health / this.maxHealth;
                    const barW = 32, barH = 4;
                    const barY = H/2 + 6;
                    // Background
                    ctx.fillStyle = 'rgba(0,0,0,0.6)';
                    ctx.beginPath();
                    ctx.roundRect(-barW/2 - 1, barY - 1, barW + 2, barH + 2, 2);
                    ctx.fill();
                    // Bar bg
                    ctx.fillStyle = '#222';
                    ctx.fillRect(-barW/2, barY, barW, barH);
                    // Bar fill
                    const hpColor = hpRatio > 0.5 ? '#00ff88' : (hpRatio > 0.25 ? '#ffff00' : '#ff3366');
                    ctx.fillStyle = hpColor;
                    ctx.fillRect(-barW/2, barY, barW * hpRatio, barH);
                    // Bar highlight
                    ctx.fillStyle = 'rgba(255,255,255,0.15)';
                    ctx.fillRect(-barW/2, barY, barW * hpRatio, barH / 2);
                }

                ctx.restore();
            }

            move(direction) {
                const speed = this.speed;
                let newX = this.x;
                let newY = this.y;

                // 坦克朝向驱动移动
                if (direction === 'forward') {
                    // 向炮管方向前进
                    newX = this.x + Math.sin(this.angle) * speed;
                    newY = this.y - Math.cos(this.angle) * speed;
                } else if (direction === 'backward') {
                    // 向炮管反方向后退
                    newX = this.x - Math.sin(this.angle) * speed;
                    newY = this.y + Math.cos(this.angle) * speed;
                }

                // 边界检测
                newX = Math.max(25, Math.min(canvas.width - 25, newX));
                newY = Math.max(60, Math.min(canvas.height - 25, newY));

                // 围墙碰撞检测
                if (!this.checkWallCollision(newX, newY)) {
                    this.x = newX;
                    this.y = newY;
                    this.bobOffset += 0.3;
                }
            }

            // 前方碰撞检测（用于敌人AI预判）
            checkForwardCollision(distance = 30) {
                const checkX = this.x + Math.sin(this.angle) * distance;
                const checkY = this.y - Math.cos(this.angle) * distance;
                const halfSize = 18;
                // 墙壁检测
                for (let wall of walls) {
                    if (checkX + halfSize > wall.x && checkX - halfSize < wall.x + wall.w &&
                        checkY + halfSize > wall.y && checkY - halfSize < wall.y + wall.h) {
                        return true;
                    }
                }
                // 边界检测
                if (checkX < 25 || checkX > canvas.width - 25 || checkY < 60 || checkY > canvas.height - 25) {
                    return true;
                }
                // 坦克之间碰撞检测
                const allTanks = [player, ...enemies];
                for (let tank of allTanks) {
                    if (tank === this || !tank) continue;
                    const dx = checkX - tank.x;
                    const dy = checkY - tank.y;
                    if (Math.sqrt(dx*dx + dy*dy) < 40) return true;
                }
                return false;
            }

            checkWallCollision(x, y) {
                const halfSize = 18;
                for (let wall of walls) {
                    if (x + halfSize > wall.x && x - halfSize < wall.x + wall.w &&
                        y + halfSize > wall.y && y - halfSize < wall.y + wall.h) {
                        return true;
                    }
                }
                // 坦克之间碰撞（所有坦克都检测）
                const allTanks = [player, ...enemies];
                for (let tank of allTanks) {
                    if (tank === this || !tank) continue;
                    const dx = x - tank.x;
                    const dy = y - tank.y;
                    if (Math.sqrt(dx*dx + dy*dy) < 40) return true;
                }
                return false;
            }

            rotate(dir) {
                this.angle += dir * 0.06;
            }

            shoot() {
                if (this.cooldown <= 0) {
                    this.cooldown = 25;
                    const bulletX = this.x + Math.sin(this.angle) * 28;
                    const bulletY = this.y - Math.cos(this.angle) * 28;
                    bullets.push(new Bullet(bulletX, bulletY, this.angle, this.isPlayer));
                }
            }

            update() {
                if (this.cooldown > 0) this.cooldown--;
                // 无敌时间倒计时
                if (this.invincibleTimer > 0) this.invincibleTimer--;

                if (!this.isPlayer) {
                    const levelData = levels[gameState.level - 1];

                    // === 前方射线检测预判碰撞 ===
                    const aboutToHit = this.checkForwardCollision(35);

                    // 如果前方即将碰撞，主动转向
                    if (aboutToHit) {
                        this.stuckTimer++;
                        // 随机转向（远离障碍物方向）
                        if (Math.random() > 0.5) {
                            this.angle += Math.PI / 2 + Math.random() * 0.5;
                        } else {
                            this.angle -= Math.PI / 2 + Math.random() * 0.5;
                        }
                        this.moveDistance = 0;  // 重置连续移动距离
                    } else {
                        // 正常移动距离计数
                        this.moveDistance += this.speed;
                        this.stuckTimer = 0;
                    }

                    // 如果在同一方向卡住太久，强制转向
                    if (this.moveDistance > 200) {
                        this.angle += (Math.random() - 0.5) * Math.PI;
                        this.moveDistance = 0;
                    }

                    // 追踪玩家倾向 - 根据关卡难度
                    if (Math.random() < levelData.intel * 0.08 && !aboutToHit) {
                        const angleToPlayer = Math.atan2(player.y - this.y, player.x - this.x);
                        let angleDiff = angleToPlayer - this.angle;
                        while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                        while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
                        this.angle += angleDiff * 0.08;
                    }

                    // 随机移动倾向
                    if (Math.random() < 0.05) {
                        this.angle += (Math.random() - 0.5) * Math.PI * 0.4;
                    }

                    // 执行移动 - 根据当前angle决定方向
                    const speed = this.speed;
                    let newX = this.x + Math.sin(this.angle) * speed;
                    let newY = this.y - Math.cos(this.angle) * speed;

                    // 边界限制
                    newX = Math.max(25, Math.min(canvas.width - 25, newX));
                    newY = Math.max(60, Math.min(canvas.height - 25, newY));

                    // 碰撞检测（双重保险：前方检测+实际位置检测）
                    if (!this.checkWallCollision(newX, newY)) {
                        this.x = newX;
                        this.y = newY;
                    } else {
                        // 如果实际位置仍然碰撞，再转向
                        this.angle += (Math.random() > 0.5 ? 1 : -1) * Math.PI / 2;
                        this.moveDistance = 0;
                    }

                    // 计算到玩家的角度用于射击
                    const angleToPlayer = Math.atan2(player.y - this.y, player.x - this.x);
                    let angleDiff = Math.abs(this.angle - angleToPlayer);
                    while (angleDiff > Math.PI) angleDiff = Math.abs(angleDiff - Math.PI * 2);

                    // 射击
                    if (angleDiff < 0.8 && Math.random() < levelData.fireRate) {
                        // 检查视线
                        const bulletX = this.x + Math.sin(this.angle) * 25;
                        const bulletY = this.y - Math.cos(this.angle) * 25;
                        if (!this.checkWallCollision(bulletX, bulletY)) {
                            this.shoot();
                        }
                    }
                }
            }
        }

        // 子弹类
        class Bullet {
            constructor(x, y, angle, fromPlayer) {
                this.x = x;
                this.y = y;
                this.angle = angle;
                this.speed = 10;
                this.radius = 5;
                this.fromPlayer = fromPlayer;
                this.alive = true;
                this.trail = [];
            }

            update() {
                this.trail.push({x: this.x, y: this.y});
                if (this.trail.length > 5) this.trail.shift();

                this.x += Math.sin(this.angle) * this.speed;
                this.y -= Math.cos(this.angle) * this.speed;

                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
                    this.alive = false;
                }
            }

            draw() {
                // 拖尾效果
                for (let i = 0; i < this.trail.length; i++) {
                    const alpha = (i + 1) / this.trail.length * 0.5;
                    const size = this.radius * (i + 1) / this.trail.length;
                    ctx.beginPath();
                    ctx.arc(this.trail[i].x, this.trail[i].y, size, 0, Math.PI * 2);
                    ctx.fillStyle = this.fromPlayer ? `rgba(0, 255, 255, ${alpha})` : `rgba(255, 51, 102, ${alpha})`;
                    ctx.fill();
                }

                // 发光效果
                ctx.shadowBlur = 20;
                ctx.shadowColor = this.fromPlayer ? '#00ffff' : '#ff3366';

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
                grad.addColorStop(0, '#fff');
                grad.addColorStop(0.5, this.fromPlayer ? '#00ffff' : '#ff3366');
                grad.addColorStop(1, this.fromPlayer ? '#008888' : '#881122');
                ctx.fillStyle = grad;
                ctx.fill();

                ctx.shadowBlur = 0;
            }
        }

        // 围墙类
        class Wall {
            constructor(x, y, w, h, hp) {
                this.x = x;
                this.y = y;
                this.w = w;
                this.h = h;
                this.hp = hp;
                this.maxHp = hp;
                this.destroyed = false;
                this.hitAnim = 0;
            }

            draw() {
                if (this.destroyed) return;

                const hitFlash = this.hitAnim > 0;
                const x = this.x, y = this.y, w = this.w, h = this.h;
                const isStrong = this.maxHp > 2;

                // Shadow beneath wall
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fillRect(x + 2, y + 2, w, h);

                // Main wall body gradient
                const grad = ctx.createLinearGradient(x, y, x + w, y + h);
                if (isStrong) {
                    grad.addColorStop(0, hitFlash ? '#888' : '#3a3a50');
                    grad.addColorStop(0.3, hitFlash ? '#999' : '#4a4a60');
                    grad.addColorStop(0.7, hitFlash ? '#777' : '#353555');
                    grad.addColorStop(1, hitFlash ? '#666' : '#2a2a45');
                } else {
                    grad.addColorStop(0, hitFlash ? '#888' : '#4a4a5e');
                    grad.addColorStop(0.3, hitFlash ? '#999' : '#555568');
                    grad.addColorStop(0.7, hitFlash ? '#777' : '#444458');
                    grad.addColorStop(1, hitFlash ? '#666' : '#38384c');
                }
                ctx.fillStyle = grad;
                ctx.fillRect(x, y, w, h);

                // Brick texture pattern
                const brickH = 6, brickW = 10;
                const offset = h > w; // vertical wall
                ctx.strokeStyle = 'rgba(0,0,0,0.2)';
                ctx.lineWidth = 0.5;
                if (!offset) {
                    // Horizontal wall - horizontal brick rows
                    for (let row = 0; row < Math.ceil(h / brickH); row++) {
                        const ry = y + row * brickH;
                        if (ry > y + h) break;
                        ctx.beginPath();
                        ctx.moveTo(x, ry);
                        ctx.lineTo(x + w, ry);
                        ctx.stroke();
                        // Vertical joints (staggered)
                        const off = (row % 2) * brickW / 2;
                        for (let col = 0; col < Math.ceil(w / brickW) + 1; col++) {
                            const jx = x + off + col * brickW;
                            if (jx > x && jx < x + w) {
                                ctx.beginPath();
                                ctx.moveTo(jx, ry);
                                ctx.lineTo(jx, Math.min(ry + brickH, y + h));
                                ctx.stroke();
                            }
                        }
                    }
                } else {
                    // Vertical wall - vertical brick pattern
                    for (let col = 0; col < Math.ceil(w / brickH); col++) {
                        const cx = x + col * brickH;
                        if (cx > x + w) break;
                        ctx.beginPath();
                        ctx.moveTo(cx, y);
                        ctx.lineTo(cx, y + h);
                        ctx.stroke();
                        const off = (col % 2) * brickW / 2;
                        for (let row = 0; row < Math.ceil(h / brickW) + 1; row++) {
                            const jy = y + off + row * brickW;
                            if (jy > y && jy < y + h) {
                                ctx.beginPath();
                                ctx.moveTo(Math.max(cx, x), jy);
                                ctx.lineTo(Math.min(cx + brickH, x + w), jy);
                                ctx.stroke();
                            }
                        }
                    }
                }

                // Surface highlight (top edge)
                ctx.fillStyle = 'rgba(255,255,255,0.06)';
                ctx.fillRect(x, y, w, 2);
                // Surface shadow (bottom edge)
                ctx.fillStyle = 'rgba(0,0,0,0.15)';
                ctx.fillRect(x, y + h - 2, w, 2);

                // Corner rivets (if wall is large enough)
                if (w > 14 && h > 14) {
                    ctx.fillStyle = isStrong ? 'rgba(255,170,0,0.4)' : 'rgba(0,255,255,0.3)';
                    const r = 1.5;
                    ctx.beginPath(); ctx.arc(x + 4, y + 4, r, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(x + w - 4, y + 4, r, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(x + 4, y + h - 4, r, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(x + w - 4, y + h - 4, r, 0, Math.PI * 2); ctx.fill();
                }

                // Reinforced border for strong walls
                if (isStrong) {
                    // Double border
                    ctx.strokeStyle = 'rgba(255,170,0,0.5)';
                    ctx.lineWidth = 1.5;
                    ctx.strokeRect(x + 1, y + 1, w - 2, h - 2);
                    ctx.strokeStyle = 'rgba(255,170,0,0.2)';
                    ctx.lineWidth = 0.5;
                    ctx.strokeRect(x + 3, y + 3, w - 6, h - 6);
                    // Energy lines along edges
                    ctx.strokeStyle = 'rgba(255,170,0,0.15)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(x + 2, y + h/2);
                    ctx.lineTo(x + w - 2, y + h/2);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(x + w/2, y + 2);
                    ctx.lineTo(x + w/2, y + h - 2);
                    ctx.stroke();
                    // Core energy dot
                    ctx.fillStyle = 'rgba(255,170,0,0.3)';
                    ctx.beginPath();
                    ctx.arc(x + w/2, y + h/2, 2, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    // Normal wall border
                    ctx.strokeStyle = 'rgba(0,255,255,0.35)';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);
                }

                // Damage cracks when damaged
                if (this.hp < this.maxHp) {
                    const hpRatio = this.hp / this.maxHp;
                    // Cracks
                    ctx.strokeStyle = `rgba(0,0,0,${0.4 * (1 - hpRatio)})`;
                    ctx.lineWidth = 1;
                    const cx = x + w * 0.3, cy = y + h * 0.4;
                    ctx.beginPath();
                    ctx.moveTo(cx, cy);
                    ctx.lineTo(cx + w * 0.15, cy - h * 0.2);
                    ctx.moveTo(cx, cy);
                    ctx.lineTo(cx + w * 0.2, cy + h * 0.15);
                    ctx.moveTo(cx, cy);
                    ctx.lineTo(cx - w * 0.1, cy + h * 0.1);
                    ctx.stroke();
                    // Second crack cluster
                    const cx2 = x + w * 0.7, cy2 = y + h * 0.6;
                    ctx.beginPath();
                    ctx.moveTo(cx2, cy2);
                    ctx.lineTo(cx2 - w * 0.1, cy2 - h * 0.15);
                    ctx.moveTo(cx2, cy2);
                    ctx.lineTo(cx2 + w * 0.12, cy2 + h * 0.1);
                    ctx.stroke();

                    // HP bar
                    const barH = 3;
                    ctx.fillStyle = 'rgba(0,0,0,0.5)';
                    ctx.fillRect(x, y + h - barH - 1, w, barH + 1);
                    const hpColor = hpRatio > 0.5 ? '#00ff88' : (hpRatio > 0.25 ? '#ffff00' : '#ff3366');
                    ctx.fillStyle = hpColor;
                    ctx.fillRect(x, y + h - barH, w * hpRatio, barH);
                    // HP bar glow
                    ctx.shadowColor = hpColor;
                    ctx.shadowBlur = 4;
                    ctx.fillRect(x, y + h - barH, w * hpRatio, barH);
                    ctx.shadowBlur = 0;
                }

                // Hit flash overlay
                if (hitFlash) {
                    ctx.fillStyle = 'rgba(255,255,255,0.15)';
                    ctx.fillRect(x, y, w, h);
                    this.hitAnim--;
                }
            }

            hit() {
                this.hp--;
                this.hitAnim = 8;
                if (this.hp <= 0) {
                    this.destroyed = true;
                    // 破坏特效
                    for (let i = 0; i < 8; i++) {
                        particles.push(new Particle(
                            this.x + Math.random() * this.w,
                            this.y + Math.random() * this.h,
                            this.maxHp > 2 ? '#ffaa00' : '#00ffff'
                        ));
                    }
                }
            }
        }

        // 粒子效果
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8;
                this.life = 1;
                this.decay = 0.02 + Math.random() * 0.02;
                this.size = 3 + Math.random() * 4;
                this.color = color;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.95;
                this.vy *= 0.95;
                this.life -= this.decay;
            }

            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;
            }

            isDead() {
                return this.life <= 0;
            }
        }

        // 爆炸效果
        class Explosion {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.radius = 5;
                this.maxRadius = 50;
                this.alpha = 1;
                this.color = color;
            }

            update() {
                this.radius += 4;
                this.alpha -= 0.04;
            }

            draw() {
                ctx.globalAlpha = this.alpha;

                // 外层
                const grad1 = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
                grad1.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
                grad1.addColorStop(0.3, this.color);
                grad1.addColorStop(1, 'rgba(0, 0, 0, 0)');
                ctx.fillStyle = grad1;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();

                // 内层
                const innerRadius = this.radius * 0.5;
                const grad2 = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, innerRadius);
                grad2.addColorStop(0, '#fff');
                grad2.addColorStop(0.5, '#ffff00');
                grad2.addColorStop(1, 'rgba(255, 100, 0, 0)');
                ctx.fillStyle = grad2;
                ctx.beginPath();
                ctx.arc(this.x, this.y, innerRadius, 0, Math.PI * 2);
                ctx.fill();

                ctx.globalAlpha = 1;
            }

            isDead() {
                return this.alpha <= 0;
            }
        }

        // 初始化关卡
        function initLevel(levelNum) {
            const levelData = levels[levelNum - 1];

            // 玩家初始位置
            player = new Tank(canvas.width / 2, canvas.height - 80, '#00aaaa', true);

            // 生成敌人
            enemies = [];
            for (let i = 0; i < levelData.enemyCount; i++) {
                let ex, ey, valid = false;
                let attempts = 0;
                while (!valid && attempts < 50) {
                    ex = 60 + Math.random() * (canvas.width - 120);
                    ey = 80 + Math.random() * 200;
                    valid = true;
                    // 检查与玩家距离
                    const dx = ex - player.x;
                    const dy = ey - player.y;
                    if (Math.sqrt(dx*dx + dy*dy) < 150) valid = false;
                    // 检查与围墙碰撞
                    for (let w of walls) {
                        if (ex + 20 > w.x && ex - 20 < w.x + w.w && ey + 20 > w.y && ey - 20 < w.y + w.h) {
                            valid = false;
                            break;
                        }
                    }
                    attempts++;
                }
                const enemy = new Tank(ex, ey, '#aa2222');
                enemy.speed = levelData.enemySpeed;
                enemies.push(enemy);
            }

            bullets = [];
            particles = [];

            // 重置生命
            gameState.lives = gameState.maxLives;
            updateUI();
        }

        // 初始化游戏
        function init(startLevel = 1) {
            gameState = {
                level: startLevel,
                score: 0,
                lives: 3,
                maxLives: 3,
                isPlaying: true,
                isPaused: false,
                isGameOver: false,
                isVictory: false,
                levelTransition: true,
                transitionTimer: 120
            };

            // 创建围墙
            walls = [];
            const mapType = levels[startLevel - 1].map;
            for (let w of wallLayouts[mapType]) {
                walls.push(new Wall(w.x, w.y, w.w, w.h, w.hp));
            }

            initLevel(startLevel);
        }

        // 带关卡的初始化（用于登录后从保存的关卡开始）
        function initGameWithLevel(level) {
            // 隐藏游戏界面，等登录后再显示
            document.querySelector('h1').style.display = 'block';
            document.querySelector('.game-container').style.display = 'block';
            document.querySelector('.controls').style.display = 'block';
            init(level);
        }

        function updateUI() {
            levelEl.textContent = gameState.level;
            scoreEl.textContent = gameState.score;
            let hearts = '';
            for (let i = 0; i < gameState.lives; i++) hearts += '❤';
            livesEl.textContent = hearts;
        }

        // 碰撞检测
        function checkCollision(a, b, aSize, bSize) {
            const dx = a.x - b.x;
            const dy = a.y - b.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            return dist < aSize + bSize;
        }

        // 游戏循环
        function gameLoop() {
            // 清空画布
            ctx.fillStyle = '#0a0a12';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制网格背景
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.03)';
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.width; i += 50) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i < canvas.height; i += 50) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }

            // 关卡过渡
            if (gameState.levelTransition) {
                gameState.transitionTimer--;

                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#00ffff';
                ctx.font = 'bold 60px Orbitron, monospace';
                ctx.textAlign = 'center';
                ctx.shadowBlur = 30;
                ctx.shadowColor = '#00ffff';
                ctx.fillText(`第 ${gameState.level} 关`, canvas.width / 2, canvas.height / 2);
                ctx.shadowBlur = 0;

                if (gameState.transitionTimer <= 0) {
                    gameState.levelTransition = false;
                }

                ctx.textAlign = 'left';
                requestAnimationFrame(gameLoop);
                return;
            }

            // 暂停状态
            if (gameState.isPaused) {
                // 绘制半透明遮罩
                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#00ffff';
                ctx.font = 'bold 56px Orbitron, monospace';
                ctx.textAlign = 'center';
                ctx.shadowBlur = 30;
                ctx.shadowColor = '#00ffff';
                ctx.fillText('暂停', canvas.width / 2, canvas.height / 2 - 20);

                ctx.shadowBlur = 0;
                ctx.fillStyle = '#ffff00';
                ctx.font = '24px Orbitron, monospace';
                ctx.fillText('按 P 继续', canvas.width / 2, canvas.height / 2 + 30);
                ctx.textAlign = 'left';

                requestAnimationFrame(gameLoop);
                return;
            }

            if (gameState.isGameOver || gameState.isVictory) {
                // 仍然绘制游戏场景
                walls.forEach(w => w.draw());
                if (gameState.lives > 0) player.draw();
                enemies.forEach(e => e.draw());
                bullets.forEach(b => b.draw());

                // 覆盖层
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                if (gameState.isVictory) {
                    ctx.fillStyle = '#00ff88';
                    ctx.font = 'bold 56px Orbitron, monospace';
                    ctx.textAlign = 'center';
                    ctx.shadowBlur = 30;
                    ctx.shadowColor = '#00ff88';
                    ctx.fillText('恭喜通关!', canvas.width / 2, canvas.height / 2 - 30);
                } else {
                    ctx.fillStyle = '#ff3366';
                    ctx.font = 'bold 56px Orbitron, monospace';
                    ctx.textAlign = 'center';
                    ctx.shadowBlur = 30;
                    ctx.shadowColor = '#ff3366';
                    ctx.fillText('游戏结束', canvas.width / 2, canvas.height / 2 - 30);
                }

                ctx.shadowBlur = 0;
                ctx.fillStyle = '#ffff00';
                ctx.font = '28px Orbitron, monospace';
                ctx.fillText(`最终得分: ${gameState.score}`, canvas.width / 2, canvas.height / 2 + 30);
                ctx.fillText('按 R 重新开始', canvas.width / 2, canvas.height / 2 + 80);
                ctx.textAlign = 'left';

                requestAnimationFrame(gameLoop);
                return;
            }

            // 玩家控制 - 坦克朝向驱动
            if (keys['KeyW'] || keys['ArrowUp']) player.move('forward');
            if (keys['KeyS'] || keys['ArrowDown']) player.move('backward');
            if (keys['KeyA'] || keys['ArrowLeft']) player.rotate(-1);
            if (keys['KeyD'] || keys['ArrowRight']) player.rotate(1);
            if (keys['Space']) player.shoot();

            // 绘制围墙
            walls.forEach(w => w.draw());
            walls = walls.filter(w => !w.destroyed);

            // 更新和绘制玩家
            player.update();
            player.draw();

            // 更新和绘制敌坦克
            enemies.forEach(enemy => {
                enemy.update();
                enemy.draw();
            });

            // 更新和绘制子弹
            bullets.forEach(bullet => bullet.update());
            bullets.forEach(bullet => bullet.draw());

            // 粒子效果
            particles.forEach(p => p.update());
            particles.forEach(p => p.draw());
            particles = particles.filter(p => !p.isDead());

            // 碰撞检测
            bullets = bullets.filter(bullet => {
                if (!bullet.alive) return false;

                // 子弹与围墙碰撞
                for (let wall of walls) {
                    if (bullet.x > wall.x && bullet.x < wall.x + wall.w &&
                        bullet.y > wall.y && bullet.y < wall.y + wall.h) {
                        wall.hit();
                        bullet.alive = false;

                        // 子弹击中特效
                        for (let i = 0; i < 4; i++) {
                            particles.push(new Particle(bullet.x, bullet.y, '#00ffff'));
                        }
                        return false;
                    }
                }

                // 子弹打中敌坦克
                if (bullet.fromPlayer) {
                    for (let i = enemies.length - 1; i >= 0; i--) {
                        if (checkCollision(bullet, enemies[i], bullet.radius, 18)) {
                            // 扣血
                            enemies[i].health -= 2;
                            bullet.alive = false;

                            // 击中特效
                            for (let j = 0; j < 4; j++) {
                                particles.push(new Particle(bullet.x, bullet.y, '#00ffff'));
                            }

                            // 血量归零则死亡
                            if (enemies[i].health <= 0) {
                                explosions.push(new Explosion(enemies[i].x, enemies[i].y, '#ff3366'));
                                enemies.splice(i, 1);
                                gameState.score += 100;
                                updateUI();
                            }

                            // 检查过关 - 只有玩家还活着时才过关
                            if (enemies.length === 0 && !gameState.isGameOver && gameState.lives > 0) {
                                // 保存进度（过关后保存当前关卡）
                                saveProgress(gameState.level, gameState.score);

                                if (gameState.level >= 12) {
                                    gameState.isVictory = true;
                                } else {
                                    gameState.level++;
                                    // 创建新关卡围墙
                                    walls = [];
                                    const mapType = levels[gameState.level - 1].map;
                                    for (let w of wallLayouts[mapType]) {
                                        walls.push(new Wall(w.x, w.y, w.w, w.h, w.hp));
                                    }
                                    initLevel(gameState.level);
                                    gameState.levelTransition = true;
                                    gameState.transitionTimer = 90;
                                }
                            }
                            return false;
                        }
                    }
                } else {
                    // 子弹打中玩家
                    if (checkCollision(bullet, player, bullet.radius, 18)) {
                        bullet.alive = false;
                        // 无敌时间，跳过伤害
                        if (player.invincibleTimer > 0) return false;

                        // 扣2点血（半血）
                        player.health -= 2;
                        // 受伤后1.5秒无敌时间
                        player.invincibleTimer = 90;  // 约1.5秒（60fps）

                        // 击中特效
                        for (let j = 0; j < 4; j++) {
                            particles.push(new Particle(bullet.x, bullet.y, '#ff3366'));
                        }

                        // 血量归0则损失一条命
                        if (player.health <= 0) {
                            explosions.push(new Explosion(player.x, player.y, '#00ffff'));
                            gameState.lives--;
                            updateUI();

                            if (gameState.lives <= 0) {
                                gameState.isGameOver = true;
                            } else {
                                // 重置玩家位置和满血
                                player.x = canvas.width / 2;
                                player.y = canvas.height - 80;
                                player.angle = 0;
                                player.health = player.maxHealth;
                            }
                        }
                        return false;
                    }
                }

                return true;
            });

            // 玩家撞到敌坦克
            for (let i = enemies.length - 1; i >= 0; i--) {
                if (checkCollision(player, enemies[i], 18, 18)) {
                    // 计算碰撞方向向量
                    const dx = player.x - enemies[i].x;
                    const dy = player.y - enemies[i].y;
                    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
                    const nx = dx / dist;  // 归一化方向
                    const ny = dy / dist;

                    // 击退效果 - 双方各退40像素
                    const knockbackDist = 40;
                    // 玩家击退
                    const playerNewX = player.x + nx * knockbackDist;
                    const playerNewY = player.y + ny * knockbackDist;
                    if (!player.checkWallCollision(playerNewX, playerNewY)) {
                        player.x = Math.max(25, Math.min(canvas.width - 25, playerNewX));
                        player.y = Math.max(60, Math.min(canvas.height - 25, playerNewY));
                    }
                    // 敌人击退（反向）
                    const enemyNewX = enemies[i].x - nx * knockbackDist;
                    const enemyNewY = enemies[i].y - ny * knockbackDist;
                    if (!enemies[i].checkWallCollision(enemyNewX, enemyNewY)) {
                        enemies[i].x = Math.max(25, Math.min(canvas.width - 25, enemyNewX));
                        enemies[i].y = Math.max(60, Math.min(canvas.height - 25, enemyNewY));
                    }

                    // 双方都扣血
                    enemies[i].health -= 2;
                    // 无敌时间，跳过伤害
                    if (player.invincibleTimer <= 0) {
                        player.health -= 2;
                        player.invincibleTimer = 90;  // 1.5秒无敌
                    }

                    // 撞击特效
                    explosions.push(new Explosion(player.x, player.y, '#00ffff'));

                    // 敌人死亡
                    if (enemies[i].health <= 0) {
                        explosions.push(new Explosion(enemies[i].x, enemies[i].y, '#ff3366'));
                        enemies.splice(i, 1);
                        gameState.score += 100;
                        updateUI();
                    }

                    // 玩家血量归0
                    if (player.health <= 0) {
                        explosions.push(new Explosion(player.x, player.y, '#00ffff'));
                        gameState.lives--;
                        updateUI();

                        if (gameState.lives <= 0) {
                            gameState.isGameOver = true;
                        } else {
                            player.x = canvas.width / 2;
                            player.y = canvas.height - 80;
                            player.angle = 0;
                            player.health = player.maxHealth;
                        }
                    }

                    // 检查过关
                    if (enemies.length === 0 && !gameState.isGameOver && gameState.lives > 0) {
                        if (gameState.level >= 12) {
                            gameState.isVictory = true;
                        } else {
                            gameState.level++;
                            walls = [];
                            const mapType = levels[gameState.level - 1].map;
                            for (let w of wallLayouts[mapType]) {
                                walls.push(new Wall(w.x, w.y, w.w, w.h, w.hp));
                            }
                            initLevel(gameState.level);
                            gameState.levelTransition = true;
                            gameState.transitionTimer = 90;
                        }
                    }
                }
            }

            // 爆炸效果
            for (let i = explosions.length - 1; i >= 0; i--) {
                explosions[i].update();
                explosions[i].draw();
                if (explosions[i].isDead()) {
                    explosions.splice(i, 1);
                }
            }

            requestAnimationFrame(gameLoop);
        }

        let explosions = [];

        // 键盘事件
        document.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (e.code === 'KeyR' && (gameState.isGameOver || gameState.isVictory)) {
                init();
            }
            // 暂停功能
            if (e.code === 'KeyP' && gameState.isPlaying && !gameState.isGameOver && !gameState.isVictory) {
                gameState.isPaused = !gameState.isPaused;
            }
            if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', e => {
            keys[e.code] = false;
        });

        // 启动游戏 - 默认隐藏，等登录后显示
        document.querySelector('h1').style.display = 'none';
        document.querySelector('.game-container').style.display = 'none';
        document.querySelector('.controls').style.display = 'none';

        // 启动游戏循环（但游戏界面隐藏）
        init();
        gameLoop();
    </script>
</body>
</html>
